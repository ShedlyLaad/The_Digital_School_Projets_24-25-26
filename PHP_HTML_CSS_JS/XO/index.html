<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer">
        <h1>Xo Game</h1>
        <div class="board" id="board">
            <div cellIndex="0" class="cell"></div>
            <div cellIndex="1" class="cell"></div>
            <div cellIndex="2" class="cell"></div>
            <div cellIndex="3" class="cell"  onclick="cellClick()"></div>
            <div cellIndex="4" class="cell"  onclick="cellClick()"></div>
            <div cellIndex="5" class="cell"  onclick="cellClick()"></div>
            <div cellIndex="6" class="cell"  onclick="cellClick()"></div>
            <div cellIndex="7" class="cell"  onclick="cellClick()"></div>
            <div cellIndex="8" class="cell"  onclick="cellClick()"></div>
        </div>
        <h2 id="statusText"></h2>
        <button class="button" id="btn-rst">
            Restart Game
           </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
</html>
